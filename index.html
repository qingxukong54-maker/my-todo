  --primary:#7B94FF;--primary-light:#252d55;--primary-dark:#6580ee;
  --border:#2e3050;--shadow:0 2px 16px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none;}
input,textarea,select{font-family:inherit;outline:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;background:var(--surface);color:var(--text);font-size:15px;transition:border .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--primary);}
::placeholder{color:var(--text3);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}

/* ===== DESKTOP: 3-column layout ===== */
.app{display:flex;height:100vh;height:100dvh;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:10;}
.sidebar-header{padding:20px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.sidebar-header h2{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.theme-toggle{font-size:20px;padding:6px 8px;border-radius:var(--radius-sm);}
.theme-toggle:hover{background:var(--surface2);}
.sidebar-nav{flex:1;overflow-y:auto;padding:0 8px 8px;}
.nav-group{margin-bottom:2px;}
.nav-group-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:14px 12px 4px;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;color:var(--text2);transition:all .15s;user-select:none;}
.nav-item:hover{background:var(--surface2);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600;}
.nav-item .icon{width:22px;text-align:center;font-size:16px;}
.nav-item .count{margin-left:auto;font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px;min-width:20px;text-align:center;}
.list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.list-add{display:flex;align-items:center;gap:8px;padding:9px 12px;color:var(--primary);font-size:13px;cursor:pointer;border-radius:var(--radius-sm);user-select:none;}
.list-add:hover{background:var(--primary-light);}
.sidebar-stats{padding:14px 16px;border-top:1px solid var(--border);}
.stat-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:8px 0 4px;}
.stat-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
.stat-text{font-size:12px;color:var(--text3);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.main-header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.view-tabs{display:flex;gap:3px;}
.view-tab{padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;color:var(--text2);}
.view-tab.active{background:var(--primary-light);color:var(--primary);font-weight:600;}
.search-box{flex:1;max-width:280px;margin-left:auto;position:relative;}
.search-box input{width:100%;padding-left:34px;background:var(--surface2);border-color:transparent;font-size:13px;}
.search-box input:focus{background:var(--surface);border-color:var(--primary);}
.search-box::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;}

.task-list{flex:1;overflow-y:auto;padding:6px 14px;-webkit-overflow-scrolling:touch;}
.task-group-header{font-size:12px;font-weight:700;color:var(--text3);padding:14px 8px 6px;display:flex;align-items:center;gap:8px;}
.task-group-header .g-count{background:var(--surface2);padding:2px 8px;border-radius:8px;font-size:11px;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;}
.task-item:hover{background:var(--surface2);}
.task-item.selected{background:var(--primary-light);}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--surface3);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;color:transparent;}
.task-check:hover{border-color:var(--primary);}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.task-content{flex:1;min-width:0;}
.task-title{font-size:15px;line-height:1.5;word-break:break-word;}
.task-title.done{text-decoration:line-through;color:var(--text3);}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.task-tag{font-size:11px;padding:1px 7px;border-radius:4px;background:var(--surface2);color:var(--text3);}
.task-date{font-size:11px;color:var(--text3);}
.task-priority{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:7px;}
.priority-high{background:var(--red);}
.priority-medium{background:var(--orange);}
.priority-low{background:var(--blue);}
.subtask-indicator{font-size:11px;color:var(--text3);}
.task-list-empty{text-align:center;padding:60px 20px;color:var(--text3);}
.task-list-empty .empty-icon{font-size:52px;margin-bottom:12px;}

.quick-add{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;flex-shrink:0;}
.quick-add input{flex:1;border-color:transparent;background:var(--surface2);}
.quick-add input:focus{background:var(--surface);border-color:var(--primary);}
.quick-add button{background:var(--primary);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;}
.quick-add button:hover{background:var(--primary-dark);}

/* Detail panel (desktop) */
.detail{width:var(--detail-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.detail.hidden{display:none;}
.detail-header{padding:14px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.detail-close{font-size:20px;color:var(--text3);padding:4px 6px;border-radius:var(--radius-sm);}
.detail-close:hover{background:var(--surface2);}
.detail-close.del{color:var(--red);}
.detail-body{flex:1;overflow-y:auto;padding:16px;}
.detail-title-input{width:100%;font-size:18px;font-weight:700;border:none;background:transparent;padding:4px 0;margin-bottom:14px;}
.detail-section{margin-bottom:22px;}
.detail-section-title{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.detail-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.detail-row label{font-size:13px;color:var(--text2);min-width:55px;}
.detail-row select,.detail-row input[type="date"],.detail-row input[type="text"]{flex:1;font-size:13px;padding:8px 10px;}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;flex:1;align-items:center;}
.tag-badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 9px;border-radius:5px;background:var(--primary-light);color:var(--primary);}
.tag-badge .tag-x{cursor:pointer;font-size:15px;line-height:1;margin-left:2px;}
.detail-notes textarea{width:100%;min-height:90px;resize:vertical;font-size:13px;padding:10px;line-height:1.7;}
.subtask-list{list-style:none;}
.subtask-item{display:flex;align-items:center;gap:8px;padding:7px 0;}
.subtask-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--surface3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s;}
.subtask-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.subtask-text{flex:1;font-size:14px;}
.subtask-text.done{text-decoration:line-through;color:var(--text3);}
.subtask-del{color:var(--text3);font-size:16px;padding:2px 6px;border-radius:4px;}
.subtask-del:hover{color:var(--red);}
.subtask-add{display:flex;gap:6px;margin-top:6px;}
.subtask-add input{flex:1;font-size:13px;padding:8px 10px;}
.subtask-add button{background:var(--surface2);color:var(--text2);padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;}

/* Calendar */
.calendar-wrap{flex:1;overflow-y:auto;padding:16px 20px;}
.calendar-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.calendar-header h3{font-size:18px;font-weight:700;min-width:150px;}
.cal-nav{background:var(--surface2);border-radius:var(--radius-sm);padding:6px 12px;font-size:15px;}
.cal-nav:hover{background:var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-weekday{text-align:center;font-size:12px;color:var(--text3);padding:8px 0;font-weight:600;}
.cal-day{min-height:72px;background:var(--surface);border-radius:var(--radius-sm);padding:5px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;overflow:hidden;}
.cal-day:hover{border-color:var(--primary);}
.cal-day.today{border-color:var(--primary);background:var(--primary-light);}
.cal-day.selected{background:var(--primary);color:#fff;box-shadow:inset 0 0 0 2px var(--primary-dark);}
.cal-day.selected .cal-day-num{color:#fff!important;font-weight:800;}
.cal-day.selected .cal-day-lunar{color:rgba(255,255,255,.7);}
.cal-day.selected .cal-day-lunar.holiday{color:#ffcdd2;}
.cal-day.selected .cal-day-lunar.term{color:#c8e6c9;}
.cal-day.other-month{opacity:.25;}
.cal-day-num{font-size:13px;font-weight:700;margin-bottom:3px;}
.cal-day-num.today{color:var(--primary);}
.cal-day-num.selected{color:#fff;font-weight:800;}
.cal-day-lunar{font-size:9px;color:var(--text3);margin-bottom:2px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-day-lunar.holiday{color:var(--red);font-weight:600;}
.cal-day-lunar.term{color:var(--green);}
.cal-task{font-size:10px;padding:2px 4px;margin-bottom:1px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-task.p-high{background:#fef2f2;color:var(--red);}
.cal-task.p-medium{background:#fff7ed;color:var(--orange);}
.cal-task.p-low{background:#eff6ff;color:var(--blue);}
.cal-task.p-none{background:var(--surface2);color:var(--text3);}
.cal-dot-row{display:flex;gap:3px;justify-content:center;margin-top:auto;padding-top:2px;}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cal-dot.has-task{background:var(--primary);}
.cal-dot.overdue{background:var(--red);}

/* Mobile calendar: equal cells + swipe */
.m-cal-container{position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;}
.m-cal-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px;}
.m-cal-year-sel,.m-cal-month-sel{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:14px;color:var(--text);font-weight:600;appearance:none;-webkit-appearance:none;}
.m-cal-year-sel{min-width:80px;}
.m-cal-month-sel{min-width:60px;}
.m-cal-today-btn{background:var(--primary-light);color:var(--primary);font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);font-weight:600;margin-left:auto;}
.m-cal-today-btn:active{background:var(--primary);color:#fff;}
.m-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .2s ease;}
.m-cal-weekday{text-align:center;font-size:11px;color:var(--text3);padding:8px 0 6px;font-weight:700;background:var(--surface2);}
.m-cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 1px;cursor:pointer;position:relative;border:0.5px solid var(--surface2);transition:background .12s;}
.m-cal-cell:active{background:var(--primary-light);}
.m-cal-cell.other-month{opacity:.3;}
.m-cal-cell.today{background:var(--primary-light);}
.m-cal-cell.selected{background:var(--primary);color:#fff;}
.m-cal-cell.selected .m-cal-cell-lunar{color:rgba(255,255,255,.7);}
.m-cal-cell.selected .m-cal-cell-lunar.holiday{color:#ffcdd2;}
.m-cal-cell.selected .m-cal-cell-lunar.term{color:#c8e6c9;}
.m-cal-cell-num{font-size:15px;font-weight:700;line-height:1.2;}
.m-cal-cell.today .m-cal-cell-num{color:var(--primary);}
.m-cal-cell.selected .m-cal-cell-num{color:#fff;}
.m-cal-cell-lunar{font-size:8px;color:var(--text3);line-height:1.2;margin-top:1px;}
.m-cal-cell-lunar.holiday{color:var(--red);font-weight:600;}
.m-cal-cell-lunar.term{color:var(--green);}
.m-cal-dots{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:2px;}
.m-cal-dot{width:4px;height:4px;border-radius:50%;}
.m-cal-dot.blue{background:var(--primary);}
.m-cal-dot.red{background:var(--red);}
.m-cal-cell.selected .m-cal-dot.blue{background:#fff;}
.m-cal-cell.selected .m-cal-dot.red{background:#ffcdd2;}

/* Calendar selected day tasks panel */
.m-cal-tasks{margin-top:10px;padding:0 4px;}
.m-cal-tasks-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;padding:0 2px;}
.m-cal-task-item{display:flex;align-items:center;gap:8px;padding:10px 8px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.m-cal-task-item:active{background:var(--surface2);}
.m-cal-task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;}
.m-cal-task-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.m-cal-task-title{flex:1;font-size:14px;line-height:1.4;}
.m-cal-task-title.done{text-decoration:line-through;color:var(--text3);}

/* FAB - Floating Action Button */
.fab{display:none;position:fixed;right:20px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;font-size:26px;box-shadow:0 4px 16px rgba(79,110,247,.4);z-index:80;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;}
.fab:active{transform:scale(.92);box-shadow:0 2px 8px rgba(79,110,247,.3);}
.fab.show{display:flex;}

/* Pomodoro */
.pomo-section{display:flex;flex-direction:column;align-items:center;padding:24px 20px;}
.pomo-circle{width:220px;height:220px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin:20px 0;}
.pomo-circle svg{position:absolute;top:-4px;left:-4px;}
.pomo-display{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--primary);}
.pomo-controls{display:flex;gap:12px;margin-top:20px;}
.pomo-btn{padding:12px 28px;border-radius:var(--radius);font-size:15px;font-weight:700;}
.pomo-btn.start{background:var(--primary);color:#fff;}
.pomo-btn.start:hover{background:var(--primary-dark);}
.pomo-btn.reset{background:var(--surface2);color:var(--text2);}
.pomo-btn.reset:hover{background:var(--border);}
.pomo-sessions{margin-top:14px;font-size:13px;color:var(--text3);}

/* Habits */
.habit-wrap{padding:16px;overflow-y:auto;flex:1;}
.habit-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.habit-name{font-size:15px;font-weight:700;margin-bottom:10px;}
.habit-week{display:flex;gap:5px;}
.habit-day-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-weight:600;transition:all .15s;}
.habit-day-btn:active{transform:scale(.9);}
.habit-day-btn.done{background:var(--green);color:#fff;}
.habit-day-btn.future{opacity:.35;}
.habit-add-row{display:flex;gap:8px;margin-top:16px;}
.habit-add-row input{flex:1;}

/* Stats */
.stats-wrap{padding:20px;overflow-y:auto;flex:1;}
.stats-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.stats-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.stats-card .num{font-size:30px;font-weight:800;color:var(--primary);}
.stats-card .label{font-size:12px;color:var(--text3);margin-top:4px;}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
.modal h3{font-size:17px;margin-bottom:16px;font-weight:700;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-actions button{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;}
.btn-cancel{background:var(--surface2);color:var(--text2);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}

/* List colors */
.list-colors{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.list-color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.list-color-opt:hover,.list-color-opt.active{border-color:var(--text);transform:scale(1.2);}

/* ===== MOBILE: bottom tab + sheet detail ===== */
/* Mobile bottom tab bar */
.bottom-tabs{display:none;}
.mobile-title{display:none;}

/* Mobile detail as bottom sheet */
@media(max-width:768px){
  .sidebar{display:none;}
  .detail{display:none !important;}
  .bottom-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:4px 0;padding-bottom:calc(4px + var(--safe-b));z-index:90;justify-content:space-around;}
  .bottom-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;min-width:56px;font-size:10px;color:var(--text3);border-radius:8px;transition:color .15s;}
  .bottom-tab .bt-icon{font-size:22px;}
  .bottom-tab.active{color:var(--primary);}
  .bottom-tab:active{background:var(--surface2);}
  .mobile-title{display:flex;align-items:center;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:var(--surface);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;}
  .mobile-title h2{font-size:18px;font-weight:800;flex:1;}
  .mobile-title .mt-actions{display:flex;gap:4px;}
  .mobile-title .mt-btn{font-size:18px;padding:6px;border-radius:var(--radius-sm);}
  .mobile-title .mt-btn:active{background:var(--surface2);}
  .main{padding-bottom:calc(60px + var(--safe-b));}
  .task-list{padding:4px 12px;}
  .quick-add{padding:10px 12px;padding-bottom:calc(10px + var(--safe-b));}
  .main-header{padding:10px 14px;}
  .search-box{max-width:none;}
  /* Mobile: hide desktop calendar, use mobile version */
  .calendar-wrap{display:none;}
  .pomo-circle{width:180px;height:180px;}
  .pomo-circle svg{width:188px;height:188px;top:-6px;left:-6px;}
  .pomo-display{font-size:40px;}
  .stats-cards{grid-template-columns:repeat(2,1fr);gap:10px;}
  .modal{border-radius:16px 16px 0 0;max-width:none;position:fixed;bottom:0;left:0;right:0;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .habit-day-btn{width:32px;height:32px;font-size:11px;}
}

/* Mobile detail sheet */
.detail-sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:150;display:none;}
.detail-sheet-overlay.show{display:block;}
.detail-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:160;max-height:85vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-b);}
.detail-sheet.show{transform:translateY(0);}
.detail-sheet-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:10px auto 6px;}
.detail-sheet-header{padding:8px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.detail-sheet-header h3{font-size:16px;font-weight:700;}
.detail-sheet-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;}
.detail-sheet-body#memoSheetBody{padding:16px;flex:1;display:flex;flex-direction:column;}
.detail-sheet-actions{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);}
.detail-sheet-actions button{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;}

/* Memo sheet - desktop: slide from right */
@media(min-width:769px){
  #memoSheetOverlay{display:none!important;}
  #memoSheet{
    position:fixed;top:0;right:0;bottom:0;left:auto;
    width:420px;max-width:50%;
    border-radius:0;box-shadow:-4px 0 24px rgba(0,0,0,.15);transform:translateX(100%);
    padding-bottom:0;z-index:200;
  }
  #memoSheet.show{transform:translateX(0);}
  #memoSheet .detail-sheet-handle{display:none;}
}
.sync-indicator{font-size:11px;color:var(--text3);padding:0 12px 8px;display:flex;align-items:center;gap:4px;}
.sync-indicator.syncing{color:var(--primary);}
.sync-indicator .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;}
.sync-indicator.error .dot{background:var(--red);}

/* Cloud setup banner */
.cloud-banner{background:var(--primary-light);border-radius:var(--radius);padding:14px 16px;margin:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.cloud-banner:hover{opacity:.9;}
.cloud-banner .cloud-icon{font-size:24px;}
.cloud-banner .cloud-text{flex:1;}
.cloud-banner .cloud-text strong{font-size:14px;color:var(--primary);}
.cloud-banner .cloud-text p{font-size:12px;color:var(--text3);margin-top:2px;}
.cloud-banner.hidden{display:none;}

/* Memo - Apple Notes style */
.memo-wrap{padding:16px;overflow-y:auto;flex:1;}
.memo-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.memo-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s,transform .1s;min-height:120px;display:flex;flex-direction:column;}
.memo-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-1px);}
.memo-card-title{font-size:15px;font-weight:700;margin-bottom:6px;word-break:break-word;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.memo-card-preview{font-size:13px;color:var(--text3);line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap;}
.memo-card-date{font-size:11px;color:var(--text3);margin-top:10px;}
.memo-empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1;}
.memo-empty .empty-icon{font-size:52px;margin-bottom:12px;}
.memo-detail{display:flex;flex-direction:column;flex:1;width:100%;}
.memo-detail-title{font-size:20px;font-weight:700;border:none;background:transparent;padding:8px 0;margin-bottom:8px;color:var(--text);width:100%;box-sizing:border-box;outline:none;}
.memo-detail-title:focus{border-bottom:2px solid var(--primary);}
.memo-detail-meta{font-size:12px;color:var(--text3);margin-bottom:12px;}
.memo-detail-body{flex:1;resize:none;border:none;background:transparent;color:var(--text);font-size:15px;line-height:1.8;padding:8px 0;outline:none;width:100%;box-sizing:border-box;word-break:break-word;white-space:pre-wrap;font-family:inherit;}
.memo-detail-body:focus{border-bottom:2px solid var(--primary);}
@media(max-width:768px){
  .memo-list{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar (desktop) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">

        <span style="font-size:14px;">☁️</span>
        <span style="flex:1;font-size:13px;color:var(--text2);">云端同步</span>
        <span id="sidebarSyncIcon" style="font-size:10px;"></span>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:10px;">
        <button onclick="manualSync()" style="flex:1;font-size:12px;padding:6px 0;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);" title="手动同步">🔄 同步</button>
        <button onclick="exportData()" style="flex:1;font-size:12px;padding:6px 0;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);" title="导出数据">📤 导出</button>
        <button onclick="importData()" style="flex:1;font-size:12px;padding:6px 0;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);" title="导入数据">📥 导入</button>

      <div style="font-size:13px;font-weight:700;">今日进度</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="todayProgress" style="width:0%"></div></div>
      <div class="stat-text" id="todayProgressText">0 / 0 已完成</div>

  </aside>

  <!-- Main -->
  <main class="main" id="mainArea">
    <!-- Mobile title bar -->

      <h2 id="mobileTitleText">收件箱</h2>

    <div class="main-header" id="mainHeader">
      <div class="view-tabs" id="viewTabs">

        <button class="view-tab" data-sort="active" onclick="setSort('active')">未完成</button>

<script>
// ===== DATA LAYER =====
const STORAGE_KEY = 'my_todo_app_v2';
const CLOUD_KEY = 'todo_cloud_config';
const defaultData = () => {
  return {
    tasks: [],
    lists: [
      {id:'list_default',name:'默认清单',color:'#4F6EF7'},
      {id:'list_japan',name:'日本站运营',color:'#F97316'},
      {id:'list_marriage',name:'跨国婚恋运营',color:'#EC4899'},
      {id:'list_bandan',name:'搬单业务运营',color:'#A855F7'},
      {id:'list_daily',name:'日常生活',color:'#22C55E'}
    ],
    habits: [],
    memos: [],
    pomodoro: { sessions:0, today:'' },
    settings: { theme:'light' },
    version: 2
  };
};

function loadData(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r){const d=JSON.parse(r); if(d.version===2){
    // Migrate: add new default lists if missing
    const defaultLists = defaultData().lists;
    const existIds = new Set(d.lists.map(l=>l.id));
    defaultLists.forEach(dl=>{
      if(!existIds.has(dl.id)) d.lists.push(dl);
    });
    return d;
  }} }catch(e){}
  return defaultData();
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  cloudSave();
}

let data = loadData();
let currentView='inbox', currentSort='all', currentListId=null, selectedTaskId=null;
let calYear, calMonth, calSelectedDate=null;
let pomoInterval=null, pomoTimeLeft=25*60, pomoRunning=false;
let isMobile = window.innerWidth <= 768;
let _detailOrigState='';

// ===== HELPERS =====
const genId = () => Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const todayStr = () => new Date().toISOString().slice(0,10);
const formatDate = d => d ? d.slice(5).replace('-','/') : '';
function parseInputDate(text){
  const t=new Date(); t.setHours(0,0,0,0);
  if(/今天/.test(text)) return todayStr();
  if(/明天/.test(text)){t.setDate(t.getDate()+1);return t.toISOString().slice(0,10);}
  if(/后天/.test(text)){t.setDate(t.getDate()+2);return t.toISOString().slice(0,10);}
  const m=text.match(/(\d{1,2})月(\d{1,2})[日号]?/);
  if(m) return `${t.getFullYear()}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return '';
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ===== CLOUD SYNC (GitHub Gist - Free, reliable, CORS supported) =====
const GIST_API = 'https://api.github.com/gists';
let cloudConfig = null;
try{ const c=localStorage.getItem(CLOUD_KEY); if(c) cloudConfig=JSON.parse(c); }catch(e){}

function showCloudSetupModal(){
  const existing = cloudConfig ? `
    <div style="margin-bottom:12px;padding:10px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;">
      <div style="font-weight:600;margin-bottom:4px;color:var(--green);">✓ 云端同步已启用</div>
      <div style="color:var(--text3);word-break:break-all;font-size:12px;margin-top:4px;">Gist ID: ${escHtml(cloudConfig.gistId)}</div>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.5;">
      在其他设备上输入上方的 Gist ID 即可同步数据。
    </p>
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn-cancel" style="color:var(--red);" onclick="disconnectCloud()">断开连接</button>
      <button class="btn-cancel" onclick="closeModal()">关闭</button>
    </div>
  ` : `
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6;">
      使用 <strong>GitHub Gist</strong> 云端同步，数据存在你的 GitHub 账号里。<br>
      需要一个只勾选 gist 权限的 Personal Access Token。
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=MyTodo-Sync" target="_blank" style="color:var(--primary);">点击生成 Token</a>
    </p>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px;">GitHub Token</label>
      <input type="password" id="cloudToken" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;font-size:13px;">
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px;">Gist ID（已有则填入，新用户留空自动创建）</label>
      <input type="text" id="cloudGistId" placeholder="留空自动创建" style="width:100%;font-size:13px;">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="connectCloud()">连接</button>
    </div>`;
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal"><h3>☁️ 云端同步设置</h3>${existing}</div>
    </div>`;
}

async function connectCloud(){
  const token = document.getElementById('cloudToken')?.value.trim();
  const gistId = document.getElementById('cloudGistId')?.value.trim();

  if(!token){
    showSync('请输入 Token', 3000, true);
    return;
  }

  showSync('正在连接...');
  try{
    let finalGistId = gistId;
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    };

    if(!finalGistId){
      // Create a new gist
      const res = await fetch(GIST_API, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          description: 'MyTodo Cloud Sync Data',
          public: false,
          files: {
            'todo-data.json': { content: JSON.stringify(data) }
          }
        })
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.message || '创建失败: '+res.status);
      }
      const gist = await res.json();
      finalGistId = gist.id;
    } else {
      // Verify existing gist
      const res = await fetch(GIST_API+'/'+finalGistId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if(!res.ok) throw new Error('Gist 不存在或 Token 无权限');
    }

    cloudConfig = {token: token, gistId: finalGistId};
    localStorage.setItem(CLOUD_KEY, JSON.stringify(cloudConfig));
    updateSyncIcon();
    document.getElementById('cloudBanner').classList.add('hidden');
    closeModal();
    document.getElementById('cloudBanner').classList.add('hidden');
    await cloudLoad();
    showSync('已连接 ✓', 3000);
    // Start polling for sync
    setInterval(()=>cloudLoad(true), 30000);
  }catch(e){
    console.error('Cloud connect error:', e);
    showSync('连接失败: '+e.message, 5000, true);
  }
}

function disconnectCloud(){
  if(!confirm('确定断开云端同步？本地数据不会丢失。')) return;
  cloudConfig=null; localStorage.removeItem(CLOUD_KEY);
  updateSyncIcon();
  document.getElementById('cloudBanner').classList.remove('hidden');
  closeModal();
  showSync('已断开', 2000);
}

// Debounce cloud saves to avoid too many requests
let cloudSaveTimer = null;
let cloudLoading = false;
function cloudSave(){
  if(!cloudConfig || cloudLoading) return;
  if(cloudSaveTimer) clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async ()=>{
    try{
      // First GET current gist to get the file's SHA
      const getRes = await fetch(GIST_API+'/'+cloudConfig.gistId, {
        headers: { 'Authorization': 'Bearer ' + cloudConfig.token }
      });
      if(!getRes.ok) throw new Error('HTTP '+getRes.status);
      const gist = await getRes.json();
      const fileSha = gist.files?.['todo-data.json']?.sha || '';

      const res = await fetch(GIST_API+'/'+cloudConfig.gistId, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + cloudConfig.token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: {
            'todo-data.json': {
              content: JSON.stringify(data),
              ...(fileSha ? { filename: 'todo-data.json' } : {})
            }
          }
        })
      });
      if(res.ok) showSync('已同步 ✓', 2000);
      else showSync('同步失败: HTTP '+res.status, 3000, true);
    }catch(e){
      console.error('Cloud save error:', e);
      showSync('同步失败: '+e.message, 3000, true);
    }
  }, 1000);
}

async function cloudLoad(silent=false){
  if(!cloudConfig) return;
  try{
    if(!silent) showSync('正在拉取...');
    cloudLoading = true;
    const res = await fetch(GIST_API+'/'+cloudConfig.gistId, {
      headers: { 'Authorization': 'Bearer ' + cloudConfig.token }
    });
    if(res.ok){
      const gist = await res.json();
      const content = gist.files?.['todo-data.json']?.content;
      if(content){
        const json = JSON.parse(content);
        if(json && json.version===2){
          const localJson = JSON.stringify(data);
          const cloudJson = JSON.stringify(json);
          if(localJson !== cloudJson){
            data = json;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            renderAll();
            if(!silent) showSync('已同步 ✓', 2000);
          } else if(!silent){
            showSync('已是最新 ✓', 2000);
          }
        }
      }
    } else {
      if(!silent) showSync('拉取失败: HTTP '+res.status, 3000, true);
    }
  }catch(e){
    if(!silent) {
      console.error('Cloud load error:', e);
      showSync('拉取失败: '+e.message, 3000, true);
    }
  } finally {
    cloudLoading = false;
  }
}

function showSync(msg, dur=2000, isError=false){
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator'+(isError?' error':' syncing');
  el.innerHTML = `<span class="dot"></span> ${msg}`;
  if(dur) setTimeout(()=>{el.className='sync-indicator';el.innerHTML='';}, dur);
}

// Update sidebar sync icon
function updateSyncIcon(){
  const el = document.getElementById('sidebarSyncIcon');
  if(!el) return;
  if(cloudConfig && cloudConfig.gistId){
    el.textContent = '🟢';
    el.title = '已连接';
  } else {
    el.textContent = '⚪';
    el.title = '未连接';
  }
}

// ===== TASKS =====
function getFilteredTasks(){
  const today=todayStr(), weekEnd=new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekEndStr=weekEnd.toISOString().slice(0,10);
  let tasks=[...data.tasks];
  switch(currentView){
    case 'inbox': /* 显示所有任务，不过滤日期 */ break;
    case 'today': tasks=tasks.filter(t=>t.date===today); break;
    case 'week': tasks=tasks.filter(t=>t.date&&t.date>=today&&t.date<=weekEndStr); break;
    case 'list': tasks=tasks.filter(t=>t.listId===currentListId); break;
  }
  if(currentSort==='active') tasks=tasks.filter(t=>!t.done);
  if(currentSort==='done') tasks=tasks.filter(t=>t.done);
  const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  if(q) tasks=tasks.filter(t=>t.title.toLowerCase().includes(q)||(t.tags||[]).some(tag=>tag.toLowerCase().includes(q)));
  const prio={high:0,medium:1,low:2,none:3};
  tasks.sort((a,b)=>{
    if(currentView==='inbox'){
      const da=a.date||'9999-99-99',db=b.date||'9999-99-99';
      if(da!==db) return da<db?-1:1;
      return (a.createdAt||0)-(b.createdAt||0);
    }
    if(a.done!==b.done) return a.done?1:-1;
    if((prio[a.priority]??3)!==(prio[b.priority]??3)) return (prio[a.priority]??3)-(prio[b.priority]??3);
    if((a.date||'z')!==(b.date||'z')) return (a.date||'z')<(b.date||'z')?-1:1;
    return b.createdAt-a.createdAt;
  });
  return tasks;
}

function renderTasks(){
  // 非任务视图（日历/番茄钟/习惯/统计）不渲染任务列表，避免覆盖页面内容
  if(['calendar','memo','pomodoro','habits','stats'].includes(currentView)) return;
  const tasks=getFilteredTasks(), today=todayStr(), el=document.getElementById('taskList');
  if(!tasks.length){el.innerHTML=`<div class="task-list-empty"><div class="empty-icon">🎉</div><div>没有任务，休息一下吧</div></div>`;renderSidebar();return;}
  const groups={};
  tasks.forEach(t=>{
    let gKey='无日期';
    if(t.date){ if(t.date===today) gKey='🔴 今天'; else if(t.date<today) gKey='⏰ 已过期'; else gKey='📅 '+formatDate(t.date); }
    if(!groups[gKey]) groups[gKey]=[]; groups[gKey].push(t);
  });
  let html='';
  for(const [gName,gTasks] of Object.entries(groups)){
    html+=`<div class="task-group-header">${gName} <span class="g-count">${gTasks.length}</span></div>`;
    gTasks.forEach(t=>{
      const list=data.lists.find(l=>l.id===t.listId);
      const subDone=(t.subtasks||[]).filter(s=>s.done).length, subTotal=(t.subtasks||[]).length;
      html+=`<div class="task-item ${selectedTaskId===t.id?'selected':''}" onclick="selectTask('${t.id}')">
        <div class="task-check ${t.done?'done':''}" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.done?'✓':''}</div>
        <div class="task-priority ${t.priority||''}"></div>
        <div class="task-content">
          <div class="task-title ${t.done?'done':''}">${escHtml(t.title)}</div>
          <div class="task-meta">
            ${t.tags?t.tags.map(tag=>`<span class="task-tag">#${escHtml(tag)}</span>`).join(''):''}
            ${t.date?`<span class="task-date">${formatDate(t.date)}</span>`:''}
            ${subTotal?`<span class="subtask-indicator">${subDone}/${subTotal}</span>`:''}
            ${list&&currentView!=='list'?`<span class="task-tag" style="color:${list.color}">${escHtml(list.name)}</span>`:''}
          </div>
        </div></div>`;
    });
  }
  el.innerHTML=html; renderSidebar();
}

// Solar terms (节气) data - approximate dates for 2020-2050
const SOLAR_TERMS={
  '1-5':'小寒','1-20':'大寒','2-3':'立春','2-18':'雨水','3-5':'惊蛰','3-20':'春分',

const SOLAR_HOLIDAYS={
  '1-1':'元旦','2-14':'情人节','3-8':'妇女节','3-12':'植树节','4-1':'愚人节',

// Lunar holidays (农历节日) - mapped to approximate solar dates per year
// Format: 'YYYY-MM-DD': '节日名'
function getLunarHolidays(year){
  // Fixed lunar date holidays, converted to solar for given year
  const lunarFixed=[
    {m:1,d:1,name:'春节'},{m:1,d:15,name:'元宵节'},{m:5,d:5,name:'端午节'},
    {m:7,d:7,name:'七夕'},{m:7,d:15,name:'中元节'},{m:8,d:15,name:'中秋节'},
    {m:9,d:9,name:'重阳节'},{m:12,d:30,name:'除夕'}
  ];
  const result={};
  lunarFixed.forEach(h=>{
    const solar=lunarToSolar(year,h.m,h.d);
    if(solar) result[`${solar.y}-${String(solar.m).padStart(2,'0')}-${String(solar.d).padStart(2,'0')}`]=h.name;
  });
  return result;
}

function lYearDays(y){let sum=348;for(let i=0x8000;i>0x8;i>>=1)sum+=(LUNAR_INFO[y-1900]&i)?1:0;return sum+leapDays(y);}
function leapMonth(y){return LUNAR_INFO[y-1900]&0xf;}
function leapDays(y){if(leapMonth(y))return(LUNAR_INFO[y-1900]&0x10000)?30:29;return 0;}
function monthDays(y,m){return(LUNAR_INFO[y-1900]&(0x10000>>m))?30:29;}

function lunarToSolar(y,lunarM,lunarD){
  let yearDaysTotal=0;
  for(let ly=1900;ly<y;ly++) yearDaysTotal+=lYearDays(ly);
  const baseDate=new Date(1900,0,31);
  const lunarNewYear=new Date(baseDate.getTime()+yearDaysTotal*86400000);
  let daysInYear=0;
  const lp=leapMonth(y);
  for(let m=1;m<lunarM;m++){
    daysInYear+=monthDays(y,m);
    if(m===lp) daysInYear+=leapDays(y);
  }
  daysInYear+=lunarD-1;
  const result=new Date(lunarNewYear.getTime()+daysInYear*86400000);
  return{y:result.getFullYear(),m:result.getMonth()+1,d:result.getDate()};
}

function solarToLunar(sY,sM,sD){
  // Convert solar date to lunar date
  const baseDate=new Date(1900,0,31);
  const targetDate=new Date(sY,sM-1,sD);
  let offset=Math.floor((targetDate-baseDate)/86400000);
  let lunarYear=1900;
  let daysInYear=lYearDays(lunarYear);
  while(offset>=daysInYear){offset-=daysInYear;lunarYear++;daysInYear=lYearDays(lunarYear);}
  let lunarMonth=1,lp=leapMonth(lunarYear),isLeap=false;
  let daysInMonth=monthDays(lunarYear,lunarMonth);
  while(offset>=daysInMonth){
    offset-=daysInMonth;
    if(lunarMonth===lp&&!isLeap){isLeap=true;daysInMonth=leapDays(lunarYear);if(offset<daysInMonth)break;}
    else{lunarMonth++;isLeap=false;daysInMonth=monthDays(lunarYear,lunarMonth);}
  }
  const lunarDay=offset+1;
  return{year:lunarYear,month:lunarMonth,day:lunarDay,isLeap};
}

function getLunarDayText(lunarMonth,lunarDay){
  // 初一显示月份，其他显示日
  if(lunarDay===1) return LUNAR_MONTH_CN[lunarMonth-1]+'月';
  return LUNAR_DAY_CN[lunarDay-1];
}

function getCalendarInfo(sY,sM,sD){
  // Returns {lunarText, type:'lunar'|'term'|'holiday'|'lholiday'}
  const dateKey=`${sM}-${sD}`;
  const fullKey=`${sY}-${String(sM).padStart(2,'0')}-${String(sD).padStart(2,'0')}`;

  // 1. Check solar holidays
  if(SOLAR_HOLIDAYS[dateKey]) return{text:SOLAR_HOLIDAYS[dateKey],type:'holiday'};

  // 2. Check solar terms (use dateKey)
  if(SOLAR_TERMS[dateKey]) return{text:SOLAR_TERMS[dateKey],type:'term'};

  // 3. Check lunar holidays
  const lunarHolidays=getLunarHolidays(sY);
  if(lunarHolidays[fullKey]) return{text:lunarHolidays[fullKey],type:'holiday'};

  // 4. Lunar day text
  const lunar=solarToLunar(sY,sM,sD);
  const lunarText=getLunarDayText(lunar.month,lunar.day);
  return{text:lunarText,type:'lunar'};
}

// Touch swipe for month navigation
let calTouchStartX=0, calTouchStartY=0, calSwiping=false;
function setupCalSwipe(){
  const grid=document.getElementById('mCalGrid');
  if(!grid) return;
  grid.addEventListener('touchstart',(e)=>{
    calTouchStartX=e.touches[0].clientX;
    calTouchStartY=e.touches[0].clientY;
    calSwiping=true;
  },{passive:true});
  grid.addEventListener('touchmove',(e)=>{
    if(!calSwiping) return;
    const dx=e.touches[0].clientX-calTouchStartX;
    const dy=e.touches[0].clientY-calTouchStartY;
    // Only horizontal swipe
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      grid.style.transform=`translateX(${dx*0.3}px)`;
      grid.style.transition='none';
    }
  },{passive:true});
  grid.addEventListener('touchend',(e)=>{
    if(!calSwiping) return;
    calSwiping=false;
    const dx=e.changedTouches[0].clientX-calTouchStartX;
    const dy=e.changedTouches[0].clientY-calTouchStartY;
    grid.style.transform='';
    grid.style.transition='transform .2s ease';
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
      if(dx<0){calMonth++;if(calMonth>11){calMonth=0;calYear++;}}
      else{calMonth--;if(calMonth<0){calMonth=11;calYear--;}}
      calSelectedDate=null;
      renderCalendar();
    }
  },{passive:true});
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if(!imported || imported.version !== 2){
          alert('文件格式不正确，请选择我的清单导出的JSON文件');
          return;
        }
        if(!confirm(`确认导入？\n\n将覆盖当前数据。\n- ${imported.tasks.length} 个任务\n- ${imported.lists.length} 个清单\n- ${imported.habits.length} 个习惯`)) return;
        data = imported;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        renderAll();
        showSync('导入成功', 3000);
        if(cloudConfig) cloudSave();
      } catch(err) {
        alert('导入失败：文件解析错误');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===== SORT =====
function setSort(s){currentSort=s;document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.sort===s));renderTasks();}

// ===== THEME =====
function toggleTheme(){
  const h=document.documentElement, isDark=h.dataset.theme==='dark';
  h.dataset.theme=isDark?'light':'dark';
  const icon=isDark?'🌙':'☀️';
  document.getElementById('themeBtn').textContent=icon;
  const mb=document.getElementById('themeBtnMobile'); if(mb) mb.textContent=icon;
  document.querySelector('meta[name="theme-color"]').content=isDark?'#f5f5f5':'#4F6EF7';
  data.settings.theme=isDark?'light':'dark'; saveData();
}
document.documentElement.dataset.theme=data.settings.theme||'light';
const themeIcon=data.settings.theme==='dark'?'☀️':'🌙';
document.getElementById('themeBtn').textContent=themeIcon;
const mbt=document.getElementById('themeBtnMobile'); if(mbt) mbt.textContent=themeIcon;

// ===== RESPONSIVE =====
function checkMobile(){isMobile=window.innerWidth<=768;}
window.addEventListener('resize',checkMobile);


// ===== MEMO =====
let selectedMemoId=null, _memoTimer=null;
function renderMemo(){
  const el=document.getElementById('taskList');
  if(!data.memos||!data.memos.length){
    el.innerHTML='<div class="memo-wrap"><div class="memo-empty"><div class="empty-icon">📝</div><div>还没有备忘录，点右下角 + 新建</div></div></div>';
    return;
  }
  const sorted=[...data.memos].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  let html='<div class="memo-wrap"><div class="memo-list">';
  sorted.forEach(m=>{
    const preview=(m.content||'').replace(/<[^>]+>/g,'').slice(0,120);
    const d=new Date(m.updatedAt||m.createdAt);
    const dt=d.getMonth()+1+'/'+(d.getDate());
    html+='<div class="memo-card" onclick="openMemoSheet(\''+m.id+'\')">'+
      '<div class="memo-card-title">'+escHtml(m.title||'无标题')+'</div>'+
      '<div class="memo-card-preview">'+escHtml(preview)+'</div>'+
      '<div class="memo-card-date">'+dt+'</div>'+
      '</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}
function openMemoSheet(id){
  if(id){selectedMemoId=id;} else {
    const now=Date.now();
    const m={id:genId(),title:'',content:'',createdAt:now,updatedAt:now};
    if(!data.memos)data.memos=[];
    data.memos.push(m);
    selectedMemoId=m.id;
    saveData();
  }
  const m=data.memos.find(x=>x.id===selectedMemoId);
  if(!m){closeMemoSheet();return;}
  document.getElementById('memoTitleInput').value=m.title||'';
  document.getElementById('memoContentInput').value=m.content||'';
  const d=new Date(m.updatedAt||m.createdAt);
  document.getElementById('memoDateMeta').textContent='修改于 '+d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
  document.getElementById('memoSheetOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('memoSheet').classList.add('show'),10);
}
function closeMemoSheet(){
  const m=data.memos?.find(x=>x.id===selectedMemoId);
  // 标题和内容都为空 → 删除，不保存
  if(m&&!m.title.trim()&&!m.content.trim()){data.memos=data.memos.filter(x=>x.id!==selectedMemoId);saveData();selectedMemoId=null;}
  document.getElementById('memoSheet').classList.remove('show');
  setTimeout(()=>{
    document.getElementById('memoSheetOverlay').classList.remove('show');
    renderMemo();
  },300);
}
function autoSaveMemo(){
  if(_memoTimer) clearTimeout(_memoTimer);
  _memoTimer=setTimeout(()=>{
    const m=data.memos.find(x=>x.id===selectedMemoId);
    if(!m)return;
    m.title=document.getElementById('memoTitleInput').value;
    m.content=document.getElementById('memoContentInput').value;
    // 标题和内容都为空 → 删除这条 memo，不保存
    if(!m.title.trim()&&!m.content.trim()){data.memos=data.memos.filter(x=>x.id!==selectedMemoId);selectedMemoId=null;}
    else { m.updatedAt=Date.now(); }
    saveData();
  },500);
}
function deleteMemo(){
  if(!selectedMemoId)return;
  if(!confirm('确定删除这条备忘录？'))return;
  data.memos=data.memos.filter(x=>x.id!==selectedMemoId);
  saveData();
  selectedMemoId=null;
  closeMemoSheet();
}
function addMemo(){
  openMemoSheet(null);
}
// FAB for memo view
const _origUpdateFab=updateFab;

// ===== RENDER ALL =====
function renderAll(){renderSidebar();renderTasks();}

// ===== INIT =====
renderSidebar();
switchView('inbox');
</script>
